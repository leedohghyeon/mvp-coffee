          <footer className={`max-w-6xl mx-auto w-full mt-16 pb-8 border-t border-gray-200 pt-8 flex flex-col items-center justify-center gap-6 print-hide ${printMode !== 'none' ? 'hidden' : ''}`}>
            <div className="inline-flex items-center gap-2 bg-blue-50 text-blue-700 px-6 py-3 rounded-full font-black text-sm border border-blue-200">
              <Database size={20} /> 실시간 데이터베이스(Firebase)에 안전하게 연결되었습니다.
            </div>
          </footer>
          
          {/* ⭐️ 1. 마법의 텍스트 복사/붙여넣기 모달 창 ⭐️ */}
          {isPasteModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex justify-center items-center p-4 print-hide">
              <div className="bg-white p-6 md:p-8 rounded-2xl w-full max-w-3xl shadow-2xl relative">
                <button onClick={() => setIsPasteModalOpen(false)} className="absolute top-4 right-4"><X size={24} className="text-gray-400 hover:text-black"/></button>
                <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-indigo-900">
                  <ClipboardPaste size={24}/> 엑셀 데이터 직접 붙여넣기 (오류 0%)
                </h2>
                <div className="bg-blue-50 border border-blue-200 text-blue-800 p-4 rounded-lg text-sm mb-4">
                  <strong>💡 파일 저장 오류 없이 가장 확실하고 쉬운 등록 방법:</strong><br/>
                  WPS나 엑셀에서 거래처 데이터 4개 열(거래처명, 대표자명, 연락처, 주소)을 마우스로 쭉 드래그해서 <strong>복사(Ctrl+C)</strong>하신 후, 아래 빈칸에 <strong>붙여넣기(Ctrl+V)</strong> 해주세요.
                </div>
                <textarea
                  className="w-full h-64 p-4 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 whitespace-pre text-sm resize-none"
                  placeholder="[여기를 클릭하고 복사한 엑셀 데이터를 붙여넣기 하세요...]"
                  value={pasteText}
                  onChange={(e) => setPasteText(e.target.value)}
                ></textarea>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setIsPasteModalOpen(false)} className="flex-1 p-3 bg-slate-100 rounded font-bold">취소</button>
                  <button onClick={handlePasteImport} className="flex-1 p-3 bg-emerald-600 text-white rounded font-bold hover:bg-emerald-700">
                    데이터 분석 및 DB 등록 시작
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 2. 신규 거래처 등록 및 수정 모달 (⭐️ 주소 및 단가 기능 복구됨) */}
          {isCustomerModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex justify-center items-center p-4 print-hide">
              <div className="bg-white p-6 md:p-8 rounded-2xl w-full max-w-md shadow-2xl relative max-h-[90vh] overflow-y-auto">
                <button onClick={() => setIsCustomerModalOpen(false)} className="absolute top-4 right-4"><X size={24} className="text-gray-400 hover:text-black"/></button>
                <h2 className="text-xl font-bold mb-4">{modalMode === 'add' ? '신규 거래처 DB에 등록' : '거래처 정보/단가 수정'}</h2>
                <div className="space-y-3">
                  <input type="text" placeholder="거래처명 *" className="w-full p-2 border rounded" value={newCustomer.name} onChange={e=>setNewCustomer({...newCustomer, name: e.target.value})} />
                  <input type="text" placeholder="대표자명" className="w-full p-2 border rounded" value={newCustomer.CEO} onChange={e=>setNewCustomer({...newCustomer, CEO: e.target.value})} />
                  <input type="text" placeholder="연락처" className="w-full p-2 border rounded" value={newCustomer.phone} onChange={e=>setNewCustomer({...newCustomer, phone: e.target.value})} />
                  <input type="text" placeholder="주소" className="w-full p-2 border rounded" value={newCustomer.address} onChange={e=>setNewCustomer({...newCustomer, address: e.target.value})} />
                  
                  <div className="mt-4 border-t pt-4">
                    <p className="font-bold text-sm mb-2 text-indigo-700">맞춤 계약 단가 설정 (선택사항)</p>
                    <p className="text-xs text-slate-500 mb-3">설정 시 해당 거래처는 부가세 체크 여부와 무관하게 이 단가가 무조건 우선 적용됩니다.</p>
                    {Object.keys(DEFAULT_SALES_PRICES_INC_VAT).map(bean => (
                      <div key={bean} className="flex justify-between items-center text-sm mb-1">
                        <span className="text-slate-700 w-32 truncate">{bean}</span>
                        <input type="number" placeholder="단가 미지정" className="w-24 p-1 border rounded text-right" 
                          value={newCustomer.customPrices[bean] || ''} 
                          onChange={e => setNewCustomer({
                            ...newCustomer, 
                            customPrices: { ...newCustomer.customPrices, [bean]: e.target.value ? Number(e.target.value) : null }
                          })} 
                        />
                      </div>
                    ))}
                  </div>

                  <div className="flex gap-2 mt-6">
                    <button onClick={() => setIsCustomerModalOpen(false)} className="flex-1 p-3 bg-slate-100 rounded font-bold">취소</button>
                    <button onClick={handleSaveCustomer} className="flex-1 p-3 bg-indigo-600 text-white rounded font-bold">DB 저장</button>
                  </div>
                </div>
              </div>
            </div>
          )}
          
          {/* 3. 주문 수정 모달 */}
          {isOrderEditModalOpen && editingOrderData && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex justify-center items-center p-4 print-hide">
              <div className="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl relative">
                <button onClick={() => setIsOrderEditModalOpen(false)} className="absolute top-4 right-4"><X size={24} /></button>
                <h2 className="text-xl font-bold mb-4">주문 내역 DB 수정</h2>
                <div className="space-y-3">
                  <div className="flex gap-2">
                    <input type="number" className="w-20 p-2 border rounded text-right" value={editingOrderData.weight} onChange={e=>setEditingOrderData({...editingOrderData, weight: e.target.value})} />
                    <input type="number" className="w-24 p-2 border rounded text-right" value={editingOrderData.pricePerKg} onChange={e=>setEditingOrderData({...editingOrderData, pricePerKg: e.target.value})} />
                  </div>
                </div>
                <div className="flex gap-2 mt-6">
                  <button onClick={() => setIsOrderEditModalOpen(false)} className="flex-1 p-3 bg-slate-100 rounded font-bold">취소</button>
                  <button onClick={handleSaveEditedOrder} className="flex-1 p-3 bg-indigo-600 text-white rounded font-bold">수정 완료</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
